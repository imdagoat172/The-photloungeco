<h2>Contact Us</h2>
<form (ngSubmit)="onSubmit()">
  <label for="name">Name:</label>
  <input type="text" id="name" [(ngModel)]="inquiry.name" name="name" required>

  <label for="email">Email:</label>
  <input type="email" id="email" [(ngModel)]="inquiry.email" name="email" required>

  <label for="phone">Phone:</label>
  <input type="tel" id="phone" [(ngModel)]="inquiry.phone" name="phone">

  <label for="eventType">Event Type:</label>
  <select id="eventType" [(ngModel)]="inquiry.eventType" name="eventType">
    <option value="Wedding">Wedding</option>
    <option value="Birthday">Birthday</option>
    <option value="Corporate">Corporate</option>
  </select>

  <label for="message">Message:</label>
  <textarea id="message" [(ngModel)]="inquiry.message" name="message"></textarea>

  <button type="submit">Submit</button>
</form>
